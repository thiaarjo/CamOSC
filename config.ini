# ============================================================
# CONFIGURAÇÕES DO PROJETO - ImgFootball
# Altere os valores aqui sem precisar mexer no código principal
# ============================================================

[camera]
# Índice da câmera (0=notebook, 1=USB, 2=segunda USB...)
index = 1
# Resolução
width = 1280
height = 720
# Usar DirectShow no Windows (recomendado)
use_dshow = true

[osc]
# IP de destino (127.0.0.1 = mesma máquina)
ip = 127.0.0.1
# Porta de destino
port = 9000
# Prefixo dos endereços OSC (ex: /body/direito/joelho)
prefix = /body

[detection]
# Confiança mínima da detecção de pose (0.0 a 1.0)
pose_detection_confidence = 0.5
# Confiança mínima do rastreamento de pose
pose_tracking_confidence = 0.5
# Complexidade do modelo (0=leve/rápido, 1=médio, 2=pesado/preciso)
pose_model_complexity = 2
# Confiança mínima da detecção de mãos
hand_detection_confidence = 0.6
# Limiar de velocidade para considerar "chute" (em pixels/frame)
kick_speed_threshold = 40

[smoothing]
# Ativar suavização das coordenadas (reduz tremulação)
enabled = true
# Fator de suavização (0.0 = sem suavização, 1.0 = máximo atraso)
# Recomendado: 0.3 a 0.5
factor = 0.4

[logging]
# Salvar coordenadas em arquivo JSON para replay/debug
save_to_file = false
# Pasta onde salvar os logs
output_folder = logs
# Printar coordenadas no terminal a cada N frames
terminal_log_interval = 30

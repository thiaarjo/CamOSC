# ============================================================
# CONFIGURACOES DO PROJETO - ImgFootball
# Altere os valores aqui sem precisar mexer no codigo principal
# ============================================================

[camera]
# Indice da camera (0=notebook, 1=USB, 2=segunda USB...)
index = 1
# Resolucao
width = 1280
height = 720
# Usar DirectShow no Windows (recomendado)
use_dshow = true

[osc]
# IP de destino (127.0.0.1 = mesma maquina)
ip = 127.0.0.1
# Porta de destino
port = 9000
# Prefixo dos enderecos OSC (ex: /body/direito/joelho)
prefix = /body

[detection]
# Confianca minima da deteccao de pose (0.0 a 1.0)
pose_detection_confidence = 0.5
# Confianca minima do rastreamento de pose
pose_tracking_confidence = 0.5
# Complexidade do modelo (0=leve/rapido, 1=medio, 2=pesado/preciso)
pose_model_complexity = 2
# Confianca minima da deteccao de maos
hand_detection_confidence = 0.6
# Limiar de velocidade para considerar "chute" (em pixels/frame)
kick_speed_threshold = 40

[smoothing]
# Ativar suavizacao das coordenadas (reduz tremulacao)
enabled = true
# Fator de suavizacao (0.0 = sem suavizacao, 1.0 = maximo atraso)
# Recomendado: 0.3 a 0.5
factor = 0.4

[logging]
# Salvar coordenadas em arquivo JSON para replay/debug
save_to_file = false
# Pasta onde salvar os logs
output_folder = logs
# Printar coordenadas no terminal a cada N frames
terminal_log_interval = 30
